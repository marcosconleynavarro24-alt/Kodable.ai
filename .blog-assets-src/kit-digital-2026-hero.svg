<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a4d3c"/>
      <stop offset="1" stop-color="#0a6650"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#27b692"/>
      <stop offset="1" stop-color="#0e8266"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- faint euro watermark -->
  <text x="1180" y="620" text-anchor="end" font-size="560" font-weight="800" fill="#ffffff" opacity="0.05">€</text>
  <!-- watermark bolt -->
  <path d="M935 70 L815 360 L905 360 L835 615 L1075 300 L975 300 L1055 70 Z" fill="#ffffff" opacity="0.06"/>
  <!-- kicker with small bolt mark -->
  <path d="M86 92 L66 150 L84 150 L70 196 L116 132 L96 132 L112 92 Z" fill="url(#bolt)"/>
  <text x="130" y="130" font-size="25" font-weight="700" fill="#bfe6d8" letter-spacing="3">GUÍA KODABLE · AYUDAS A LA DIGITALIZACIÓN</text>
  <!-- headline -->
  <text x="78" y="312" font-size="118" font-weight="800" fill="#ffffff" letter-spacing="-4">Kit Digital 2026</text>
  <!-- subhead -->
  <text x="84" y="392" font-size="40" font-weight="600" fill="#cdeadf">Hasta 29.000 € para digitalizar tu negocio</text>
  <!-- audience chips -->
  <g font-size="26" font-weight="700" fill="#eafaf4">
    <rect x="84" y="448" width="190" height="58" rx="29" fill="#ffffff" opacity="0.13"/>
    <text x="179" y="486" text-anchor="middle" fill="#eafaf4">Autónomos</text>
    <rect x="288" y="448" width="300" height="58" rx="29" fill="#ffffff" opacity="0.13"/>
    <text x="438" y="486" text-anchor="middle" fill="#eafaf4">Pymes y micropymes</text>
    <rect x="602" y="448" width="316" height="58" rx="29" fill="#ffffff" opacity="0.13"/>
    <text x="760" y="486" text-anchor="middle" fill="#eafaf4">Empresas hasta 250 empleados</text>
  </g>
  <!-- EU funding strip -->
  <g>
    <rect x="84" y="566" width="74" height="50" rx="8" fill="#13339e"/>
    <text x="121" y="599" text-anchor="middle" font-size="22" font-weight="700" fill="#ffd617">★ ★</text>
    <text x="172" y="600" font-size="23" font-weight="600" fill="#bfe6d8">Financiado por la Unión Europea · NextGenerationEU</text>
  </g>
</svg>
