<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 372" font-family="Arial, Helvetica, sans-serif">
  <rect width="1000" height="372" fill="#ffffff"/>
  <text x="40" y="56" font-size="30" font-weight="800" fill="#16221f" letter-spacing="-1">Cómo pedir el Kit Digital en 4 pasos</text>

  <!-- cards -->
  <g>
    <!-- 1 -->
    <rect x="40" y="96" width="210" height="214" rx="18" fill="#f4f7f4" stroke="#dde6e1"/>
    <circle cx="78" cy="140" r="26" fill="#0a4d3c"/>
    <text x="78" y="149" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff">1</text>
    <text x="64" y="206" font-size="20" font-weight="700" fill="#16221f">Regístrate</text>
    <text x="64" y="236" font-size="15" fill="#4b5c56">Crea tu cuenta en</text>
    <text x="64" y="258" font-size="15" fill="#4b5c56">acelerapyme.gob.es</text>
    <text x="64" y="280" font-size="15" fill="#4b5c56">con certificado digital.</text>

    <!-- 2 -->
    <rect x="272" y="96" width="210" height="214" rx="18" fill="#f4f7f4" stroke="#dde6e1"/>
    <circle cx="310" cy="140" r="26" fill="#0a4d3c"/>
    <text x="310" y="149" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff">2</text>
    <text x="296" y="206" font-size="20" font-weight="700" fill="#16221f">Autodiagnóstico</text>
    <text x="296" y="236" font-size="15" fill="#4b5c56">Completa el test</text>
    <text x="296" y="258" font-size="15" fill="#4b5c56">(unas 13 preguntas).</text>
    <text x="296" y="280" font-size="15" fill="#4b5c56">Obligatorio y gratis.</text>

    <!-- 3 -->
    <rect x="504" y="96" width="210" height="214" rx="18" fill="#f4f7f4" stroke="#dde6e1"/>
    <circle cx="542" cy="140" r="26" fill="#0a4d3c"/>
    <text x="542" y="149" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff">3</text>
    <text x="528" y="206" font-size="20" font-weight="700" fill="#16221f">Solicita el bono</text>
    <text x="528" y="236" font-size="15" fill="#4b5c56">Presenta la ayuda en</text>
    <text x="528" y="258" font-size="15" fill="#4b5c56">la sede de Red.es,</text>
    <text x="528" y="280" font-size="15" fill="#4b5c56">según tu segmento.</text>

    <!-- 4 -->
    <rect x="736" y="96" width="210" height="214" rx="18" fill="#f4f7f4" stroke="#dde6e1"/>
    <circle cx="774" cy="140" r="26" fill="#0a4d3c"/>
    <text x="774" y="149" text-anchor="middle" font-size="26" font-weight="800" fill="#ffffff">4</text>
    <text x="760" y="206" font-size="20" font-weight="700" fill="#16221f">Elige agente</text>
    <text x="760" y="236" font-size="15" fill="#4b5c56">Escoge un agente</text>
    <text x="760" y="258" font-size="15" fill="#4b5c56">digitalizador del</text>
    <text x="760" y="280" font-size="15" fill="#4b5c56">catálogo oficial.</text>
  </g>

  <!-- chevrons -->
  <g fill="none" stroke="#0e8266" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M256 193 l12 10 -12 10"/>
    <path d="M488 193 l12 10 -12 10"/>
    <path d="M720 193 l12 10 -12 10"/>
  </g>

  <text x="40" y="350" font-size="15" fill="#4b5c56">Fuente: acelerapyme.gob.es y sede.red.gob.es. El test de autodiagnóstico es obligatorio para cobrar el bono.</text>
</svg>
