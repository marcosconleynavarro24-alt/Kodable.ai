<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#27b692"/>
      <stop offset="1" stop-color="#0a4d3c"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="660" fill="#ffffff"/>
  <text x="40" y="56" font-size="31" font-weight="800" fill="#16221f" letter-spacing="-1">How a Google result looks now</text>
  <text x="40" y="90" font-size="19" fill="#4b5c56">The AI-written answer sits on top. The familiar list of links starts lower down.</text>

  <!-- search bar -->
  <rect x="40" y="118" width="920" height="54" rx="27" fill="#f4f7f4" stroke="#dde6e1"/>
  <circle cx="74" cy="145" r="11" fill="none" stroke="#4b5c56" stroke-width="3"/>
  <line x1="82" y1="153" x2="92" y2="163" stroke="#4b5c56" stroke-width="3" stroke-linecap="round"/>
  <text x="108" y="152" font-size="20" fill="#33433e">best tapas near me</text>

  <!-- AI answer card -->
  <rect x="40" y="196" width="920" height="236" rx="16" fill="#e3f3ed" stroke="#cfe7dd"/>
  <circle cx="74" cy="230" r="13" fill="url(#chip)"/>
  <path d="M74 222 l3 6 6 2 -6 2 -3 6 -3 -6 -6 -2 6 -2 z" fill="#ffffff"/>
  <text x="96" y="237" font-size="19" font-weight="700" fill="#0a4d3c">AI answer</text>
  <!-- skeleton answer lines -->
  <rect x="64" y="262" width="860" height="12" rx="6" fill="#bfe0d3"/>
  <rect x="64" y="286" width="820" height="12" rx="6" fill="#bfe0d3"/>
  <rect x="64" y="310" width="600" height="12" rx="6" fill="#bfe0d3"/>
  <!-- sources row -->
  <text x="64" y="356" font-size="15" font-weight="700" fill="#0a4d3c" letter-spacing="1">SOURCES</text>
  <rect x="64" y="368" width="150" height="44" rx="10" fill="#ffffff" stroke="#cfe7dd"/>
  <circle cx="86" cy="390" r="8" fill="#dde6e1"/>
  <rect x="102" y="384" width="96" height="12" rx="6" fill="#dde6e1"/>
  <rect x="230" y="368" width="150" height="44" rx="10" fill="#ffffff" stroke="#cfe7dd"/>
  <circle cx="252" cy="390" r="8" fill="#dde6e1"/>
  <rect x="268" y="384" width="96" height="12" rx="6" fill="#dde6e1"/>
  <!-- highlighted "your business" source -->
  <rect x="396" y="366" width="180" height="48" rx="10" fill="#ffffff" stroke="#0e8266" stroke-width="2"/>
  <circle cx="420" cy="390" r="8" fill="#0e8266"/>
  <text x="436" y="395" font-size="14" font-weight="700" fill="#0a4d3c">your business?</text>

  <!-- web results, pushed down + faded -->
  <g opacity="0.55">
    <text x="40" y="474" font-size="15" font-weight="700" fill="#4b5c56" letter-spacing="1">WEB RESULTS</text>
    <rect x="40" y="486" width="240" height="10" rx="5" fill="#0a6650"/>
    <rect x="40" y="504" width="520" height="14" rx="7" fill="#2a63c9"/>
    <rect x="40" y="528" width="900" height="10" rx="5" fill="#dde6e1"/>
    <rect x="40" y="546" width="840" height="10" rx="5" fill="#dde6e1"/>

    <rect x="40" y="580" width="240" height="10" rx="5" fill="#0a6650"/>
    <rect x="40" y="598" width="470" height="14" rx="7" fill="#2a63c9"/>
    <rect x="40" y="622" width="900" height="10" rx="5" fill="#dde6e1"/>
  </g>
</svg>
