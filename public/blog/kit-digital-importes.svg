<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 660" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#27b692"/>
      <stop offset="1" stop-color="#0a4d3c"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="660" fill="#ffffff"/>
  <text x="40" y="58" font-size="31" font-weight="800" fill="#16221f" letter-spacing="-1">Importe máximo del bono por segmento</text>
  <text x="40" y="92" font-size="19" fill="#4b5c56">El tamaño de tu plantilla decide tu tramo. Cuanto mayor la empresa, mayor la ayuda.</text>

  <!-- rows: III, II, I, IV, V -->
  <!-- Seg III -->
  <text x="40" y="170" font-size="22" font-weight="700" fill="#16221f">Segmento III</text>
  <text x="40" y="194" font-size="16" fill="#4b5c56">0 – 2 empleados</text>
  <rect x="300" y="152" width="58" height="40" rx="8" fill="url(#bar)"/>
  <text x="372" y="180" font-size="25" font-weight="800" fill="#0a4d3c">3.000 €</text>

  <!-- Seg II -->
  <text x="40" y="266" font-size="22" font-weight="700" fill="#16221f">Segmento II</text>
  <text x="40" y="290" font-size="16" fill="#4b5c56">3 – 9 empleados</text>
  <rect x="300" y="248" width="116" height="40" rx="8" fill="url(#bar)"/>
  <text x="430" y="276" font-size="25" font-weight="800" fill="#0a4d3c">6.000 €</text>

  <!-- Seg I -->
  <text x="40" y="362" font-size="22" font-weight="700" fill="#16221f">Segmento I</text>
  <text x="40" y="386" font-size="16" fill="#4b5c56">10 – 49 empleados</text>
  <rect x="300" y="344" width="232" height="40" rx="8" fill="url(#bar)"/>
  <text x="546" y="372" font-size="25" font-weight="800" fill="#0a4d3c">12.000 €</text>

  <!-- Seg IV -->
  <text x="40" y="458" font-size="22" font-weight="700" fill="#16221f">Segmento IV</text>
  <text x="40" y="482" font-size="16" fill="#4b5c56">50 – 99 empleados</text>
  <rect x="300" y="440" width="483" height="40" rx="8" fill="url(#bar)"/>
  <text x="797" y="468" font-size="25" font-weight="800" fill="#0a4d3c">25.000 €</text>

  <!-- Seg V -->
  <text x="40" y="554" font-size="22" font-weight="700" fill="#16221f">Segmento V</text>
  <text x="40" y="578" font-size="16" fill="#4b5c56">100 – 249 empleados</text>
  <rect x="300" y="536" width="560" height="40" rx="8" fill="url(#bar)"/>
  <text x="874" y="564" font-size="25" font-weight="800" fill="#0a4d3c">29.000 €</text>

  <line x1="40" y1="612" x2="960" y2="612" stroke="#dde6e1" stroke-width="1"/>
  <text x="40" y="640" font-size="15" fill="#4b5c56">Fuente: Programa Kit Digital — espanadigital.gob.es y sede.red.gob.es (importes vigentes, segmentos I–V).</text>
</svg>
